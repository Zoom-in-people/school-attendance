<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 창체 출결 스마트 대시보드</title>
    <style>
        :root {
            --sidebar-bg: #f1f3f5;
            --primary: #4dabf7;
            --accent: #ff6b6b;
            --success: #51cf66;
            --bg: #f8f9fa;
            --text-main: #495057;
            --grade1: #ffec99;
            --grade2: #b2f2bb;
            --grade3: #a5d8ff;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: var(--bg); color: var(--text-main); }
        .container { display: flex; height: 100vh; overflow: hidden; }

        /* 1단계: 학급 사이드바 */
        .sidebar { width: 220px; background: var(--sidebar-bg); border-right: 1px solid #dee2e6; padding: 25px 15px; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar h3 { font-size: 1.1em; margin-bottom: 20px; text-align: center; color: #343a40; }
        .class-list-container { flex-grow: 1; overflow-y: auto; }

        .class-btn { 
            width: 100%; padding: 14px; margin-bottom: 10px; border: 2px solid transparent; 
            background: white; color: #495057; border-radius: 12px; 
            cursor: pointer; text-align: left; transition: all 0.2s;
            font-size: 1em; font-weight: 700;
        }
        .class-btn.active { border-color: var(--primary); transform: scale(1.03); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grade-1 { background-color: var(--grade1); }
        .grade-2 { background-color: var(--grade2); }
        .grade-3 { background-color: var(--grade3); }

        /* 2단계: 분류 및 활동 리스트 영역 */
        .list-area { width: 350px; background: white; border-right: 1px solid #dee2e6; padding: 25px; overflow-y: auto; flex-shrink: 0; }
        .category-group { margin-bottom: 25px; }
        .category-title { font-size: 0.9em; font-weight: bold; color: #adb5bd; margin-bottom: 10px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .activity-item { padding: 15px; background: #f8f9fa; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .activity-item:hover { border-color: var(--primary); background: #fff; }
        .activity-item.active { background: #e7f5ff; border-color: var(--primary); font-weight: bold; }
        .activity-date { font-size: 0.8em; color: #868e96; }

        /* 3단계: 상세 입력 영역 */
        .detail-area { flex-grow: 1; padding: 40px; overflow-y: auto; background: white; }
        .empty-msg { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; color: #adb5bd; font-size: 1.5em; font-weight: bold; gap: 20px; text-align: center; }
        
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; margin: 30px 0; }
        .btn-student { padding: 16px 0; border: 2px solid #e9ecef; background: #fff; border-radius: 10px; cursor: pointer; font-size: 1.1em; font-weight: bold; color: #495057; }
        .btn-student.selected { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.08); }

        .btn-save { width: 100%; padding: 20px; background: var(--success); color: white; border: none; border-radius: 15px; font-size: 1.2em; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-save:disabled { background: #ced4da; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ced4da; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h3>👤 학급 선택</h3>
        <div class="class-list-container" id="classList">데이터 로딩 중...</div>
    </div>

    <div class="list-area">
        <h3 id="listTitle">📋 활동 리스트</h3>
        <div id="categoryContainer"></div>
    </div>

    <div class="detail-area" id="detailArea">
        <div class="empty-msg">
            <span style="font-size: 4em;">📝</span>
            창의적 체험활동 기록<br>
            <small style="font-size: 0.6em; color: #ced4da; font-weight: normal;">왼쪽에서 학급을 먼저 선택해 주세요.</small>
        </div>
    </div>
</div>

<script>
    const BASE_URL = 'https://api.steinhq.com/v1/storages/69a6f915affba40a6258507c';
    let allClassData = [];
    let classInfoMap = {};
    let allActivities = [];
    let currentClass = '';
    let currentActivity = '';
    let currentDate = '';

    window.onload = async () => {
        await Promise.all([fetchClasses(), fetchActivities()]);
    };

    async function fetchClasses() {
        try {
            const res = await fetch(`${BASE_URL}/classes`);
            allClassData = await res.json();
            allClassData.forEach(item => { classInfoMap[item.학급] = item.인원수; });
            renderClassList(); // 초기에는 아무것도 안 띄움 (활동 선택 전까지)
        } catch(e) { console.error("학급 로딩 실패", e); }
    }

    async function fetchActivities() {
        try {
            const res = await fetch(`${BASE_URL}/activities`);
            allActivities = await res.json();
            renderActivityCategories(); // 모든 활동 분류 먼저 표시
        } catch(e) { console.error("활동 로딩 실패", e); }
    }

    // 1단계: 활동 분류와 활동명 렌더링 (사전 표시)
    function renderActivityCategories() {
        const container = document.getElementById('categoryContainer');
        container.innerHTML = '';
        
        // 분류별로 그룹화
        const groups = allActivities.reduce((acc, curr) => {
            if(!acc[curr.분류]) acc[curr.분류] = [];
            acc[curr.분류].push(curr);
            return acc;
        }, {});

        for (const [category, acts] of Object.entries(groups)) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'category-group';
            groupDiv.innerHTML = `<span class="category-title">📂 ${category}</span>`;
            
            acts.forEach(act => {
                const item = document.createElement('div');
                item.className = 'activity-item';
                item.innerHTML = `<div class="activity-date">📅 ${act.날짜}</div><div>⚡ ${act.활동명}</div>`;
                item.onclick = () => selectActivity(act, item);
                groupDiv.appendChild(item);
            });
            container.appendChild(groupDiv);
        }
    }

    // 2단계: 활동 선택 시 해당 학년 학급 필터링 및 렌더링
    function selectActivity(act, element) {
        currentActivity = act.활동명;
        currentDate = act.날짜;
        const targetGrades = act.학년.toString().split(',').map(s => s.trim());
        
        document.querySelectorAll('.activity-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');

        // 사이드바 학급 필터링
        const classListDiv = document.getElementById('classList');
        classListDiv.innerHTML = '';
        
        const filteredClasses = allClassData.filter(c => {
            const classGrade = c.학급.substring(0, 1);
            return targetGrades.includes(classGrade);
        });

        filteredClasses.forEach(c => {
            const btn = document.createElement('button');
            const grade = c.학급.substring(0, 1);
            btn.className = `class-btn grade-${grade}`;
            btn.innerHTML = `⭐ ${c.학급}`;
            btn.onclick = () => selectClass(c.학급, btn);
            classListDiv.appendChild(btn);
        });

        document.getElementById('detailArea').innerHTML = `<div class="empty-msg"><span style="font-size: 3em;">👤</span>학급을 선택하면 출결창이 열립니다.</div>`;
    }

    // 3단계: 학급 선택 시 최종 출결 그리드 표시
    async function selectClass(className, btn) {
        currentClass = className;
        document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const detailArea = document.getElementById('detailArea');
        detailArea.innerHTML = `
            <div style="border-bottom: 2px solid #f1f3f5; padding-bottom: 20px; margin-bottom: 30px;">
                <h2 style="color: var(--primary); margin:0;">✅ ${currentClass} | ${currentActivity}</h2>
                <span style="color: #adb5bd; font-weight: bold;">📅 활동 날짜: ${currentDate}</span>
            </div>
            <div class="student-grid" id="studentGrid"></div>
            <button class="btn-save" id="saveBtn" onclick="saveData()"><span>💾</span> 데이터 저장/수정 완료</button>
            <div id="status" style="display:none; text-align:center; margin-top:15px; color:var(--primary); font-weight:bold;">🚀 서버 전송 중...</div>
        `;

        const grid = document.getElementById('studentGrid');
        const count = classInfoMap[currentClass] || 30;
        for (let i = 1; i <= count; i++) {
            const b = document.createElement('button');
            b.className = 'btn-student';
            b.innerText = i;
            b.onclick = function() { this.classList.toggle('selected'); };
            grid.appendChild(b);
        }

        // 기존 데이터 로딩
        const res = await fetch(`${BASE_URL}/attendance?search={"학급":"${currentClass}","활동명":"${currentActivity}"}`);
        const existData = await res.json();
        if (existData.length > 0) {
            const absentNos = existData[0].결석번호.split(', ').map(n => n.trim());
            document.querySelectorAll('.btn-student').forEach(b => {
                if (absentNos.includes(b.innerText)) b.classList.add('selected');
            });
            document.getElementById('saveBtn').innerHTML = "<span>🔄</span> 기존 기록 수정 완료";
        }
    }

    async function saveData() {
        const selected = document.querySelectorAll('.btn-student.selected');
        const absentList = Array.from(selected).map(b => b.innerText).sort((a,b)=>+a - +b).join(', ');
        const btn = document.getElementById('saveBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.style.display = 'block';

        const row = { "날짜": currentDate, "학급": currentClass, "활동명": currentActivity, "결석번호": absentList };

        const check = await fetch(`${BASE_URL}/attendance?search={"학급":"${currentClass}","활동명":"${currentActivity}"}`);
        const checkData = await check.json();

        let method = 'POST', body = JSON.stringify([row]);
        if (checkData.length > 0) {
            method = 'PUT', body = JSON.stringify({ condition: { "학급": currentClass, "활동명": currentActivity }, set: row });
        }

        try {
            const response = await fetch(`${BASE_URL}/attendance`, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: body
            });
            if (response.ok) {
                alert('🎉 데이터가 성공적으로 처리되었습니다!');
                btn.disabled = false; status.style.display = 'none';
            }
        } catch(e) {
            alert('❌ 실패! 네트워크 상태를 확인하세요.');
            btn.disabled = false; status.style.display = 'none';
        }
    }
</script>
</body>
</html>
